<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome - Bookstore</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1350') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.85); /* Exact transparency from your image */
            padding: 50px 40px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 320px; text-align: center;
        }
        h1 { margin-top: 0; margin-bottom: 30px; font-size: 32px; color: #000; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border: 1px solid #aaa; border-radius: 5px; box-sizing: border-box;
        }
        button {
            width: 120px; padding: 10px;
            background-color: #007bff; color: white;
            border: none; border-radius: 8px; font-size: 16px;
            cursor: pointer; font-weight: bold;
        }
        .footer-text { margin-top: 25px; font-size: 15px; color: #333; }
        .footer-text a { color: #800080; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Welcome!</h1>
        <form th:action="@{/login}" method="post">
    <div>
        <label>Username:</label>
        <input type="text" name="username" required /> </div>
    <div>
        <label>Password:</label>
        <input type="password" name="password" required /> </div>
    <button type="submit">Login</button>
</form>
        <div class="footer-text">
            New user? <a th:href="@{/register}">Register</a>
        </div>
    </div>
</body>
</html>
