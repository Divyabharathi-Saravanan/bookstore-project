<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Book</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/image/background.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 350px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: #218838; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Book</h2>
    
    <form th:action="@{/save-book}" th:object="${book}" method="post">
        
        <div class="form-group">
            <label>Book Title</label>
            <input type="text" th:field="*{title}" placeholder="Enter title" required>
        </div>
        
        <div class="form-group">
            <label>Author</label>
            <input type="text" th:field="*{author}" placeholder="Enter author" required>
        </div>
        
        <div class="form-group">
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" placeholder="0.00" required>
        </div>
        
        <button type="submit" class="btn-submit">Save Book</button>
        
        <a href="/inventory-view" class="back-link">Cancel and Go Back</a>
        
    </form> </div>

</body>
</html>
