<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #bebcbc; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 1100px; margin: auto; }
        th { background: #34495e; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <div class="d-flex justify-content-between mb-4">
            <h1 class="fw-bold h2">Bookstore Inventory Management</h1>
            <a href="/logout" class="btn btn-outline-secondary btn-sm">Logout</a>
        </div>

        <div class="d-flex justify-content-between mb-3">
            <a href="/add-book" class="btn btn-success">+ Add New Book</a>
            <a href="/cart" class="btn btn-primary">🛒 View My Cart</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <form th:action="@{/inventory-view}" method="get" style="margin-bottom: 20px;">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by book title..." />
    <button type="submit">Search</button>
    <a th:href="@{/inventory-view}">Clear</a>
</form>
            </div>
        </div>

        <table class="table">
            <thead>
                <tr><th>Title</th><th>Author</th><th>Price</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.price}"></td>
                    <td>
                        <a th:href="@{/edit-book/{id}(id=${book.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/add-to-cart/{id}(id=${book.id})}" class="btn btn-info btn-sm text-white">Add to Cart</a>
                        <a th:href="@{/delete-book/{id}(id=${book.id})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
