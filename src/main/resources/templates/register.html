<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background image matching your library screenshot */
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            background-color: #f0f4f8;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #008000; /* Exact Green from your screenshot */
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #006400;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Register</h2>
        <form th:action="@{/register}" method="post">
            <input type="text" name="fullName" placeholder="DIVYABHARATHI SARAVANAN" required>
            <input type="email" name="email" placeholder="divyabharathi18104@gmail.com" required>
            <input type="text" name="username" placeholder="Divyabharathi S" required>
            <input type="password" name="password" placeholder="**********" required>
            <button type="submit">Submit Details</button>
        </form>
    </div>

</body>
</html>
