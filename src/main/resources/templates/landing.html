<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome to Bookstore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            /* Using your specific bookstore background */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('/image/inventory-bright.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }

        .inventory_card {
            background: rgba(255, 255, 255, 0.1); /* Glassmorphism effect */
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 600px;
        }

        .btn-start {
            background-color: #fff;
            color: #2c3e50;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-start:hover {
            background-color: #f1f1f1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="inventory_card">
        <h1 class="display-4 fw-bold mb-4">Your Journey Starts Here</h1>
        <p class="lead mb-5">Manage your personal bookstore inventory with ease and style.</p>
        
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a href="/register" class="btn-start">Join the Library</a>
            <a href="/login" class="btn btn-outline-light btn-lg rounded-pill px-4">Login</a>
        </div>
    </div>
</body>
</html>
