<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .check-box {
            background-color: #00c853; /* Bright Green */
            color: white;
            width: 70px;
            height: 70px;
            line-height: 70px;
            font-size: 45px;
            font-weight: bold;
            border-radius: 4px; /* Slightly rounded corners like screenshot */
            margin: 0 auto 25px;
        }

        h1 {
            color: #2ecc71;
            font-size: 32px;
            margin-bottom: 15px;
        }

        p {
            color: #333;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-back {
            background-color: #34495e; /* Dark Navy/Slate */
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.3s;
            display: inline-block;
        }

        .btn-back:hover {
            background-color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-box">✓</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your purchase. Your order has been recorded.</p>
        <a href="/inventory" class="btn-back">Back to Bookstore</a>
    </div>

</body>
</html>
